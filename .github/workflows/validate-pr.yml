name: Validate submission

# Submission PRs are opened by the relay (Cloudflare Worker) from a branch IN THIS REPO, so
# this workflow runs with repo secrets (R2 read creds, truth-table URL) and a write token —
# enabling the sandboxed "download from R2 -> fully validate -> auto-merge" gate with no human
# step. A direct fork PR gets a read-only token and no secrets, so the R2 download fails and it
# is never merged: forks cannot bypass the relay. The PR may only add a single metadata.yaml
# (enforced by server.intake); it carries pointers to the raw files in R2 — never code — and we
# only ever run THIS repo's validator on data, never PR-supplied code.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "submissions/**/metadata.yaml"

permissions:
  contents: write          # auto-merge on pass
  pull-requests: write      # post the result comment + merge

concurrency:
  group: validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (base repo code; fetch history for the PR diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Cache the ~164 MB truth table across runs, keyed on its committed manifest sha,
      # so a PR doesn't re-download it every time.
      - name: Cache truth table
        uses: actions/cache@v4
        with:
          path: .truth-cache
          key: truth-${{ hashFiles('reference/truth_table_manifest.json') }}

      - name: Determine changed files
        id: changed
        run: |
          git fetch origin "${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          echo "Changed files:"; echo "$CHANGED"
          echo "files<<EOF" >> "$GITHUB_OUTPUT"; echo "$CHANGED" >> "$GITHUB_OUTPUT"; echo "EOF" >> "$GITHUB_OUTPUT"

      - name: "Validate submission (sandbox: download from R2 + full validation)"
        id: validate
        env:
          OBJECTSTORE_BACKEND: r2
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TRUTH_TABLE_URL: ${{ secrets.TRUTH_TABLE_URL }}
          FLUX_TRUTH_CACHE: ${{ github.workspace }}/.truth-cache
        run: |
          set +e
          python -m server.intake ${{ steps.changed.outputs.files }} \
            --base-ref "origin/${{ github.base_ref }}" \
            --json-out report.json > report.md 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat report.md

      - name: Comment result on PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [ -s report.md ] || echo "_Validation output unavailable — see the Actions log._" > report.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file report.md

      - name: Auto-merge on pass
        if: steps.validate.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" --squash --delete-branch

      - name: Fail the check if validation failed
        if: steps.validate.outputs.exit_code != '0'
        run: |
          echo "Validation failed — not merging."; exit 1
