# Cloudflare Worker: the intake relay.
#   - presigns R2 multipart uploads for the browser drop box (Uppy AwsS3 protocol),
#   - rate-limits by IP + globally (KV; eventually-consistent spam backstop, not a hard quota),
#   - on completion, opens a same-repo PR adding submissions/{model_id}_val_{strategy}/metadata.yaml.
#
# Non-secret config lives in [vars]; secrets are set with `wrangler secret put NAME` (see deploy/SETUP.md):
#   R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, GITHUB_TOKEN

name = "fluxtrapolation-intake"
main = "src/index.js"
compatibility_date = "2024-09-23"

[vars]
GITHUB_REPO = "anyafries/FLUXtrapolation-leaderboard"
ALLOWED_ORIGIN = "https://anyafries.github.io"           # GitHub Pages origin (drop box host)
R2_ENDPOINT = "https://REPLACE_ACCOUNT_ID.r2.cloudflarestorage.com"
R2_BUCKET = "fluxtrapolation-incoming"
# Rate limit: spam backstop only.
RL_SUBMISSIONS_PER_HOUR = "10"     # finalised submissions per IP per hour
RL_SUBMISSIONS_PER_DAY = "50"      # finalised submissions globally per day
RL_CREATES_PER_HOUR = "200"        # multipart-create calls per IP per hour (9 per submission)

# KV: rate-limit counters + owner registry (model_id -> sha256(owner_token)).
[[kv_namespaces]]
binding = "RL"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
